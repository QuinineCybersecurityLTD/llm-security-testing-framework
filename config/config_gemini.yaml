# Set GGUF_MODEL_PATH environment variable to point to your local GGUF model file
# Example: export GGUF_MODEL_PATH=/path/to/mistral-7b-instruct-v0.2.Q4_K_M.gguf

# LLM Security Testing Framework Configuration
# GOOGLE GEMINI VERSION - FREE TIER AVAILABLE!

# Target models to test
targets:
  - name: "gemini-flash"
    type: "gemini_api"
    model_name: "gemini-2.5-flash"  # Fast, cheap, free tier available
    auth:
      token: "${GEMINI_API_KEY}"  # Set via environment variable
    parameters:
      temperature: 0.7
      max_tokens: 4000  # Sufficient for complete responses
      top_p: 0.95
      top_k: 40
    timeout: 240  # Increased for large responses
    max_retries: 2

# Judge model (evaluates attack results)
judge_model:
  name: "mistral-judge-gguf"
  type: "local_gguf"
  model_name: "${GGUF_MODEL_PATH}"
  parameters:
    temperature: 0.5  # Lower for consistent evaluation
    max_tokens: 1000
    top_p: 0.9
  timeout: 120
  max_retries: 2

# Execution settings - Conservative for API tier limits
execution:
  pool_size: 1  # Only 1 concurrent request (3 RPM limit = 1 request every 20 seconds)
  rate_limit_rpm: 3  # API Key limit: 3 RPM
  rate_limit_tpm: 200000  # API Key limit: 200k tokens per minute
  max_concurrent_attacks: 1  # One at a time
  delay_between_attacks_ms: 90000  # 20 second delay (3 RPM = 1 req/20 sec)
  circuit_breaker:
    enabled: false  # Disable for testing
    failure_threshold: 5
    timeout_seconds: 240
    half_open_max_requests: 2

# Attack configuration
attacks:
  # Enable auto-generated attacks
  use_autogenerated: true

  # Auto-generation settings
  autogenerate:
    categories:
      - "PROMPT_INJECTION"
      - "JAILBREAK"
      - "SENSITIVE_INFO_DISCLOSURE"
    attacks_per_category: 5

  sources:
    - type: "local_yaml"
      path: "attacks"                    # Load ALL attack YAML files (315+ attacks)

  # Categories to test
  categories:
    - "PROMPT_INJECTION"
    - "JAILBREAK"
    - "SENSITIVE_INFO_DISCLOSURE"
    - "PII_LEAKAGE"
    - "EXCESSIVE_AGENCY"
    - "ENCODING_BYPASS"
    - "MULTILINGUAL"
    - "MANY_SHOT"
    - "MULTI_TURN_ATTACK"
    - "HALLUCINATION_ATTACK"

  complexity_levels:
    - "LOW"
    - "MEDIUM"
    - "HIGH"

# Evaluation settings
evaluation:
  methods:
    llm_judge:
      enabled: true
      confidence_threshold: 0.7

    pattern_matching:
      enabled: true

    semantic_analysis:
      enabled: true

# Logging
logging:
  output_dir: "logs"
  level: "INFO"

# Reporting
reporting:
  output_dir: "reports"
  formats:
    - "html"
    - "json"

# Notes on Gemini Free Tier Limits:
# - Gemini 1.5 Flash: 15 RPM, 1 million TPM, 1,500 RPD (requests per day)
# - Gemini 1.5 Pro: 2 RPM, 32,000 TPM, 50 RPD
# - Free tier is quite generous for testing!
# - See: https://ai.google.dev/pricing
