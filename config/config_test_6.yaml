# LLM Security Testing Framework Configuration
# Test Suite: 6 Complete Jailbreak Prompts with Full Report Generation

# Target models to test
targets:
  - name: "gemini-flash"
    type: "gemini_api"
    model_name: "gemini-2.0-flash"
    auth:
      token: "${GEMINI_API_KEY}"
    parameters:
      temperature: 0.7
      max_tokens: 4000  # Sufficient for complete responses
      top_p: 0.95
      top_k: 40
    timeout: 60
    max_retries: 3

# Judge model (evaluates attack results)
judge_model:
  name: "gemini-judge"
  type: "gemini_api"
  model_name: "gemini-2.0-flash"
  auth:
    token: "${GEMINI_API_KEY}"
  parameters:
    temperature: 0.3
    max_tokens: 500
    top_p: 0.95
  timeout: 60
  max_retries: 3

# Execution settings - For testing 6 prompts
execution:
  pool_size: 1
  rate_limit_rpm: 10
  rate_limit_tpm: 200000
  max_concurrent_attacks: 1
  delay_between_attacks_ms: 5000  # 5 second delay between attacks
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    timeout_seconds: 120
    half_open_max_requests: 2

# Attack configuration - Use test_6_attacks YAML
attacks:
  sources:
    - type: "local_yaml"
      path: "attacks/test_6_attacks.yaml"  # Use 6-prompt test file
  
  categories:
    - "JAILBREAK"
  
  complexity_levels:
    - "MEDIUM"

# Evaluation settings
evaluation:
  methods:
    llm_judge:
      enabled: true
      confidence_threshold: 0.7
    
    pattern_matching:
      enabled: true
    
    semantic_analysis:
      enabled: false

# Logging
logging:
  output_dir: "logs"
  level: "INFO"

# Reporting - Full report generation
reporting:
  output_dir: "reports"
  formats:
    - "html"
    - "json"
