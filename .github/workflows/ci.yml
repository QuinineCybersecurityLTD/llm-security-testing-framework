# ══════════════════════════════════════════════════════════════════════
# LLM Security Framework — CI Pipeline
# Runs on every push/PR: secrets → lint → type-check → tests → eval → build
# ══════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 0: Secret scanning (blocks everything else) ────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline || true
          detect-secrets audit .secrets.baseline --report --fail-on-unaudited

  # ── Stage 1: Code quality ─────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ adapters/ --output-format=github

      - name: Type check with mypy
        run: mypy src/ adapters/ --ignore-missing-imports
        # Blocking: type errors fail the build

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            -m "not slow and not integration" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Stage 2: Golden eval regression ──────────────────────────────────
  golden-eval:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core deps
        run: pip install -e ".[dev]"

      - name: Run golden evaluation set
        run: python scripts/eval_golden.py --strict
        env:
          GOLDEN_EVAL_PATH: .benchmarks/golden_eval.yaml

  # ── Stage 3: YAML smoke test ──────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core deps
        run: pip install -e ".[dev]"

      - name: Smoke test — YAML loading
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.attack_engine import AttackLibrary
          lib = AttackLibrary()
          lib.load_from_yaml('attacks/owasp_attacks.yaml')
          count = len(lib.get_all_attacks())
          assert count > 0, f'Expected attacks, got {count}'
          print(f'✓ Loaded {count} attacks from OWASP YAML')
          "

  # ── Stage 4: Docker build ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [quality, smoke-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t llm-security-framework:test .
      - name: Verify image runs
        run: docker run --rm llm-security-framework:test --version
