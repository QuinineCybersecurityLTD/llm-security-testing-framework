# ============================================================================
# ENCODING & OBFUSCATION BYPASS SUITE
# Based on: GARAK probes.encoding, Promptfoo base64/rot13/leetspeak strategies
#
# Theory: Safety classifiers pattern-match on plaintext. Encoded harmful
#         content bypasses keyword/semantic matching. The model's reasoning
#         capability can decode the payload, but safety filters operate on
#         raw token input before logical decoding.
#
# Encodings: Base64, ROT13, Leetspeak, Pig Latin, Morse, Hex, Binary,
#            Caesar Cipher, Reverse Text, Unicode tricks, Nested Encoding
# ============================================================================

metadata:
  suite_name: "Encoding & Obfuscation Bypass Suite"
  version: "1.0"
  description: "25 encoding-based attacks that obfuscate harmful content to bypass safety classifiers"
  author: "Quinine AI Security Team"
  research_basis:
    - "GARAK probes.encoding module (15+ encoding schemes)"
    - "Promptfoo base64, rot13, leetspeak strategies"
    - "Wei et al. 2024 вЂ” Jailbroken: How Does LLM Safety Training Fail?"

attacks:

