# ============================================================================

metadata:
  name: "Parameterized Many-Shot Jailbreaking Suite"
  version: "1.0"
  description: >
    Tests many-shot jailbreaking at parameterized shot counts (5, 10, 25,
    50, 100, 256) to generate attack success rate curves. Anthropic's
    research showed ASR increases log-linearly with shot count. Two harm
    categories are tested: cybersecurity exploitation and social engineering.
  source: "Many-Shot Jailbreaking (Anthropic, 2024)"
  methodology: >
    Each attack includes N fabricated Q&A pairs where the assistant
    demonstrates harmful compliance. The final turn requests the same
    type of harmful content. By running all shot counts against the same
    model, operators can plot an ASR curve and identify the model's
    resistance threshold.
  total_attacks: 12

