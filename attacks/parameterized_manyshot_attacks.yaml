# Parameterized Many-Shot Jailbreaking Suite
# Based on: "Many-Shot Jailbreaking" (Anthropic, 2024)
# Purpose: Generate ASR-vs-shot-count curves to quantify context window
#          exploitation effectiveness at different scales.
# Version: 1.0
# Created: 2026-03-22
